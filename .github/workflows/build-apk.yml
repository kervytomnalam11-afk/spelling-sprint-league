name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. System deps ─────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-11-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            libffi-dev libssl-dev libsqlite3-dev \
            ccache build-essential libltdl-dev \
            python3-pip

      # ── 4. Cache buildozer dirs ────────────────────────────────────────────
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 5. Install Buildozer + Cython ──────────────────────────────────────
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── 6. Pre-accept ALL Android SDK licenses ─────────────────────────────
      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android/licenses"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > "$HOME/.android/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            >> "$HOME/.android/licenses/android-sdk-license"
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > "$HOME/.android/licenses/android-sdk-preview-license"
          echo -e "\n33b6937101352bc1c4d3f036da786f2e61af3b3e" \
            >> "$HOME/.android/licenses/android-sdk-preview-license"
          echo "count=0" > "$HOME/.android/repositories.cfg"

      # ── 7. Build debug APK ─────────────────────────────────────────────────
      - name: Build APK (debug)
        run: buildozer android debug
        env:
          ANDROID_HOME: ${{ env.HOME }}/.buildozer/android/platform/android-sdk

      # ── 8. Upload APK ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spelling-sprint-league-debug
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
