name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 libffi-dev libssl-dev libsqlite3-dev ccache build-essential libltdl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd' > "$HOME/.android/licenses/android-sdk-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a\n33b6937101352bc1c4d3f036da786f2e61af3b3e' > "$HOME/.android/licenses/android-sdk-preview-license"
          echo "count=0" > "$HOME/.android/repositories.cfg"

      - name: Build APK (debug)
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spelling-sprint-league-debug
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30