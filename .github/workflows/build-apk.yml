name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            libffi-dev libssl-dev libsqlite3-dev \
            ccache build-essential libltdl-dev \
            openjdk-11-jdk python3-pip
          pip install --upgrade pip
          pip install buildozer cython

      - name: Write Android SDK licenses
        run: |
          mkdir -p "$HOME/.android/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > "$HOME/.android/licenses/android-sdk-license"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$HOME/.android/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> "$HOME/.android/licenses/android-sdk-license"
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > "$HOME/.android/licenses/android-sdk-preview-license"
          echo -e "\n33b6937101352bc1c4d3f036da786f2e61af3b3e" >> "$HOME/.android/licenses/android-sdk-preview-license"
          echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > "$HOME/.android/licenses/android-googletv-license"
          echo -e "\n601085b94cd77f0b54ff86406957099ebe79c4d" > "$HOME/.android/licenses/android-sdk-arm-dbt-license"
          echo "count=0" > "$HOME/.android/repositories.cfg"

      - name: Install Android SDK build tools manually
        run: |
          SDK="$HOME/.buildozer/android/platfor